name: Auto Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release-pipeline:
    runs-on: ubuntu-latest
    if: github.event.pusher.name != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version bump is needed
        id: check_changes
        run: |
          LATEST_TAG=$(git tag --sort=-version:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No tags found, creating initial version"
            echo "needs_version_bump=true" >> $GITHUB_OUTPUT
          else
            CHANGES=$(git diff --name-only $LATEST_TAG..HEAD | grep -E '\.(ts|tsx|js|json|yml|yaml|md|css|mjs)$' | wc -l)
            if [ $CHANGES -gt 0 ]; then
              echo "Found $CHANGES significant changes, version bump needed"
              echo "needs_version_bump=true" >> $GITHUB_OUTPUT
            else
              echo "No significant changes found, skipping version bump"
              echo "needs_version_bump=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Get current version
        id: get_version
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        run: |
          if [ -f "VERSION" ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="1.0.0"
          fi
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: calc_version
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        run: |
          CURRENT="${{ steps.get_version.outputs.current_version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          COMMIT_MESSAGES=$(git log --pretty=format:"%s" $(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")..HEAD)
          if echo "$COMMIT_MESSAGES" | grep -qE "^(feat|feature)(\(.+\))?!:|^[^:]+!:|BREAKING CHANGE"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMIT_MESSAGES" | grep -qE "^(feat|feature)(\(.+\))?:"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version will be: $NEW_VERSION"

      - name: Update VERSION file
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        run: |
          echo "${{ steps.calc_version.outputs.new_version }}" > VERSION
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.calc_version.outputs.new_version }} [skip ci]"

      - name: Install pnpm
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Set up Node.js
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies and build
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          echo "Next.js build completed"

      - name: Install git-cliff for changelog
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/orhun/git-cliff/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_NUMBER=${LATEST_VERSION#v}
          curl -L "https://github.com/orhun/git-cliff/releases/download/${LATEST_VERSION}/git-cliff-${VERSION_NUMBER}-x86_64-unknown-linux-gnu.tar.gz" | tar xzf -
          sudo mv "git-cliff-${VERSION_NUMBER}/git-cliff" /usr/local/bin/

      - name: Generate changelog
        id: changelog
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        run: |
          if [ ! -f cliff.toml ]; then
            cat > cliff.toml << 'EOF'
          [changelog]
          header = """
          # Changelog
          All notable changes to this project will be documented in this file.
          """
          body = """
          {% for group, commits in commits | group_by(attribute="group") %}
          ## {{ group | upper_first }}
          {% for commit in commits %}
          - {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
          {% endfor %}
          {% endfor %}
          """
          trim = true

          [git]
          conventional_commits = true
          filter_unconventional = false
          commit_parsers = [
              { message = "^feat", group = "Features" },
              { message = "^fix", group = "Bug Fixes" },
              { message = "^doc", group = "Documentation" },
              { message = "^perf", group = "Performance" },
              { message = "^refactor", group = "Refactor" },
              { message = "^style", group = "Styling" },
              { message = "^test", group = "Testing" },
              { message = "^chore", group = "Miscellaneous Tasks" },
          ]
          tag_pattern = "v[0-9]*"
          sort_commits = "oldest"
          EOF
          fi
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            CHANGELOG=$(git-cliff --unreleased --strip header)
          else
            CHANGELOG=$(git-cliff --latest --strip header)
          fi
          echo "$CHANGELOG" > CHANGELOG.md
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        run: |
          git tag "v${{ steps.calc_version.outputs.new_version }}"
          git push origin "v${{ steps.calc_version.outputs.new_version }}"
          git push origin main

      - name: Create GitHub Release
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "v${{ steps.calc_version.outputs.new_version }}"
          release_name: "Release v${{ steps.calc_version.outputs.new_version }}"
          body: |
            ## Changes in v${{ steps.calc_version.outputs.new_version }}

            ${{ steps.changelog.outputs.changelog }}

            ## Docker Image
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/viewra:latest
            ```
          draft: false
          prerelease: false

      - name: Set up Docker Buildx
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/viewra
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=v${{ steps.calc_version.outputs.new_version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.calc_version.outputs.new_version }}
            type=semver,pattern={{major}},value=v${{ steps.calc_version.outputs.new_version }}

      - name: Build and push Docker image
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Send Telegram notification
        if: steps.check_changes.outputs.needs_version_bump == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d "chat_id=${TELEGRAM_CHAT_ID}" -d "parse_mode=Markdown" --data-urlencode "text=Viewra v${{ steps.calc_version.outputs.new_version }} Released!"
          else
            echo "Telegram notification skipped"
          fi
